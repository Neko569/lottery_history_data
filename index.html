<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="description" content="体彩大乐透与双色球开奖历史查询、走势图分析与随机号码生成" />
    <meta name="theme-color" content="#0E0E12" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>彩运 · 开奖历史与走势</title>
    <script>
      // 在 React 渲染前应用主题，避免深色模式闪烁
      // 偏好优先级：localStorage("light"|"dark") > 跟随本地时间(18:00~6:00 深色)
      (function () {
        try {
          var stored = localStorage.getItem('cai-yun-theme');
          var theme;
          if (stored === 'light' || stored === 'dark') {
            theme = stored;
          } else {
            var h = new Date().getHours();
            theme = (h >= 18 || h < 6) ? 'dark' : 'light';
          }
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
