<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DC2626"/>
      <stop offset="1" stop-color="#991B1B"/>
    </linearGradient>

    <radialGradient id="ball" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(22 20) rotate(50) scale(25)">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FEE2E2"/>
    </radialGradient>

    <filter id="softShadow" x="8" y="8" width="42" height="42" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#7F1D1D" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)"/>

  <!-- Lottery ball -->
  <circle cx="27" cy="27" r="17" fill="url(#ball)" filter="url(#softShadow)"/>

  <!-- Main reflection -->
  <ellipse cx="21" cy="19" rx="5.5" ry="4" fill="#FFFFFF" opacity="0.9"/>

  <!-- Curved reflection -->
  <path
    d="M17 27C18.5 22.5 22.5 19.5 27 19"
    stroke="#FFFFFF"
    stroke-width="2.5"
    stroke-linecap="round"
    opacity="0.55"
  />

  <!-- Small reflection dot -->
  <circle cx="33" cy="18" r="2" fill="#FFFFFF" opacity="0.65"/>

  <!-- Bold number -->
  <text
    x="27"
    y="35"
    text-anchor="middle"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="22"
    font-weight="900"
    fill="#991B1B"
    stroke="#991B1B"
    stroke-width="0.8"
    paint-order="stroke fill"
  >7</text>

  <!-- Mini trend line -->
  <path
    d="M34 44L41 37L47 41L54 31"
    stroke="#FFFFFF"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Trend points -->
  <circle cx="34" cy="44" r="2.5" fill="#FEE2E2"/>
  <circle cx="41" cy="37" r="2.5" fill="#FEE2E2"/>
  <circle cx="47" cy="41" r="2.5" fill="#FEE2E2"/>
  <circle cx="54" cy="31" r="2.5" fill="#FEE2E2"/>
</svg>